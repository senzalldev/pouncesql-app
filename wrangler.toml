# Cloudflare Worker (static assets) for pouncesql.com
# Deploy:  cd website && npx wrangler deploy
# Local:   npx wrangler dev
#
# After first deploy, attach the custom domain in the Cloudflare dashboard:
#   Workers & Pages → pouncesql-web → Settings → Domains & Routes → add pouncesql.com
name = "pouncesql-web"
compatibility_date = "2025-01-01"

[assets]
directory = "."
not_found_handling = "single-page-application"

# Custom domains — wrangler creates the DNS records automatically since the
# pouncesql.com zone is on Cloudflare.
[[routes]]
pattern = "pouncesql.com"
custom_domain = true

[[routes]]
pattern = "www.pouncesql.com"
custom_domain = true
